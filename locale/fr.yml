zephyrisle-latex-pro:
  admin:
    settings:
      katex_options_heading: Options KaTeX
      delimiters_label: Délimiteurs
      delimiters_text: Séparez-les par des virgules. <strong>%e%</strong> représente l'expression mathématique.
      block_delimiters_text: Délimiteurs <strong>BBCode</strong> pour les expressions de bloc
      inline_delimiters_text: Délimiteurs <strong>BBCode</strong> pour les expressions en ligne
      alias_block_delimiters_text: Délimiteurs <strong>alias</strong> pour les expressions de bloc
      alias_inline_delimiters_text: Délimiteurs <strong>alias</strong> pour les expressions en ligne
      block_asciimath_delimiters_text: Délimiteurs <strong>BBCode</strong> pour les expressions AsciiMath de bloc
      inline_asciimath_delimiters_text: Délimiteurs <strong>BBCode</strong> pour les expressions AsciiMath en ligne
      alias_block_asciimath_delimiters_text: Délimiteurs <strong>alias</strong> pour les expressions AsciiMath de bloc
      alias_inline_asciimath_delimiters_text: Délimiteurs <strong>alias</strong> pour les expressions AsciiMath en ligne
      primary_delimiters_text: Les premiers délimiteurs des listes ci-dessus seront considérés comme principaux.
      output_mode_label: Mode de sortie
      output_mode_text: Choisissez le langage de balisage pour la sortie
      error_color_label: Couleur des commandes non prises en charge ou LaTeX invalide
      error_color_text: Choisissez la couleur dans laquelle les commandes non prises en charge et le LaTeX invalide sont rendus <strong>lorsque le lancement d'erreur est désactivé</strong>.
      sizing_options_heading: Options de dimensionnement
      minimum_thickness_text: Épaisseur minimale (em)
      maximum_size_text: Taille maximale (em)
      macros_label: Macros
      macros_text: Une collection de macros personnalisées.
      java_syntax_text: Vous devez les écrire en utilisant la syntaxe JavaScript.
      maximum_expand_limit_text: Limite d'expansion maximale
      enable_fleqn_label: Activer les équations alignées à gauche (fleqn)
      enable_leqno_label: Activer les numéros d'équation à gauche (leqno)
      color_is_text_color_label: Autoriser la commande <code>\color</code> à prendre deux arguments (colorIsTextColor)
      throw_on_error_label: Lancer une erreur sur une commande non prise en charge ou un LaTeX invalide
      bbcode_delimiters_rule_text: Les délimiteurs BBCode doivent être composés uniquement de lettres majuscules ou minuscules et de tirets.
      cdn_options_heading: Options CDN
      cdn_katex_text: URL CDN pour <strong>KaTeX</strong>
      sri_katex_text: Hachage SRI pour <strong>KaTeX</strong>
      cdn_asciimath2tex_text: URL CDN pour <strong>asciimath2tex</strong>
      sri_asciimath2tex_text: Hachage SRI pour <strong>asciimath2tex</strong>
      other_options_heading: Autres options
      enable_editor_buttons_label: Afficher les boutons sur l'éditeur de texte
      aliases_as_primary_label: Utiliser les délimiteurs alias comme délimiteurs principaux si possible
      allow_asciimath_label: Autoriser la syntaxe AsciiMath
      enable_copy_tex_label: Autoriser la copie de la source des éléments rendus par KaTeX
      quote_button_text: Vous devez activer l'extension <code>flarum/mentions</code> pour activer le bouton de citation.

  forum:
    composer:
      block_expression: Expression de bloc
      block_expression_asciimath: Expression de bloc (AsciiMath)
      inline_expression: Expression en ligne
      inline_expression_asciimath: Expression en ligne (AsciiMath)
      asciimath_only: AsciiMath uniquement
