zephyrisle-latex-pro:
  admin:
    settings:
      katex_options_heading: KaTeX オプション
      delimiters_label: 区切り文字
      delimiters_text: カンマで区切ります。<strong>%e%</strong> は数式を表します。
      block_delimiters_text: ブロック式の <strong>BBCode</strong> 区切り文字
      inline_delimiters_text: インライン式の <strong>BBCode</strong> 区切り文字
      alias_block_delimiters_text: ブロック式の<strong>エイリアス</strong>区切り文字
      alias_inline_delimiters_text: インライン式の<strong>エイリアス</strong>区切り文字
