      macros_label: マクロ
      macros_text: カスタムマクロのコレクション。
      java_syntax_text: JavaScript の構文を使用して記述する必要があります。
      maximum_expand_limit_text: 最大展開制限
      enable_fleqn_label: 左揃え方程式を有効にする (fleqn)
      enable_leqno_label: 左側の方程式番号を有効にする (leqno)
      color_is_text_color_label: <code>\color</code> コマンドが2つの引数を取ることを許可 (colorIsTextColor)
      throw_on_error_label: サポートされていないコマンドまたは無効な LaTeX でエラーをスロー
