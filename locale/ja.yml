      allow_asciimath_label: AsciiMath 構文を許可
      enable_copy_tex_label: KaTeX レンダリング要素のソースのコピーを許可
      quote_button_text: 引用ボタンを有効にするには、<code>flarum/mentions</code> 拡張機能を有効にする必要があります。

